<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - YExplorer</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .contact-page {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-8) var(--space-6);
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }
    
    .page-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    .page-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--gray-900);
      margin-bottom: var(--space-2);
    }
    
    .page-subtitle {
      font-size: var(--text-base);
      color: var(--gray-500);
    }
    
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: var(--space-8);
    }
    
    .contact-info-section {
      background: var(--gray-0);
      border: var(--border-default);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
    }
    
    .contact-info-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--gray-900);
      margin-bottom: var(--space-6);
    }
    
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }
    
    .contact-item:last-child {
      margin-bottom: 0;
    }
    
    .contact-icon-wrapper {
      width: 44px;
      height: 44px;
      background: var(--blue-50);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .contact-icon {
      width: 20px;
      height: 20px;
      color: var(--blue-600);
    }
    
    .contact-item-content h3 {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--gray-900);
      margin-bottom: 4px;
    }
    
    .contact-item-content p {
      font-size: var(--text-sm);
      color: var(--gray-600);
      line-height: 1.5;
    }
    
    .contact-item-content a {
      color: var(--blue-600);
      text-decoration: none;
    }
    
    .contact-item-content a:hover {
      text-decoration: underline;
    }
    
    .social-links {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
      padding-top: var(--space-5);
      border-top: var(--border-light);
    }
    
    .social-link {
      width: 40px;
      height: 40px;
      background: var(--gray-100);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-600);
      transition: all var(--duration-fast) var(--ease-fast);
    }
    
    .social-link:hover {
      background: var(--blue-50);
      color: var(--blue-600);
    }
    
    .social-link svg {
      width: 20px;
      height: 20px;
    }
    
    .contact-form-section {
      background: var(--gray-0);
      border: var(--border-default);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
    }
    
    .form-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--gray-900);
      margin-bottom: var(--space-6);
    }
    
    .form-group {
      margin-bottom: var(--space-5);
    }
    
    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--gray-700);
      margin-bottom: var(--space-2);
    }
    
    .form-input,
    .form-textarea {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: var(--border-default);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      transition: all var(--duration-fast) var(--ease-fast);
      background: var(--gray-0);
    }
    
    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
    }
    
    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }
    
    .form-submit {
      width: 100%;
      height: 48px;
      background: var(--gradient-blue);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-fast);
      box-shadow: var(--shadow-blue);
    }
    
    .form-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(30, 136, 229, 0.35);
    }
    
    .form-submit:active {
      transform: translateY(0);
    }
    
    @media (max-width: 768px) {
      .contact-page {
        padding: var(--space-4) var(--space-3);
      }
      
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="user-profile">
          <img class="user-avatar" src="images/AI助手形象.png" alt="AI助手">
          <div class="user-info">
            <div class="user-name">YExplorer</div>
            <div class="user-status">小探——你的海大朋友</div>
          </div>
        </div>
        <button class="new-chat-btn" onclick="window.location.href='index.html'" aria-label="返回AI助手">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>AI助手</span>
        </button>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-item" onclick="window.location.href='index.html'">
          <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">

          </svg>
          <span>AI 浏览器</span>
        </div>
        <div class="nav-item" onclick="window.location.href='index.html'">

            <path d="M6 9h6M9 6v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>AI 创作</span>
        </div>
      </nav>
      
      <div class="sidebar-content">
        <div class="history-section-title">快捷导航</div>
        <div class="history-list">
          <div class="history-item" onclick="window.location.href='map.html'">
            <div class="history-item-content">
              <svg class="history-item-icon" viewBox="0 0 16 16" fill="none">
                <path d="M3 5l5-1.5 5 1.5L18 3v12l-5 1.5-5-1.5L3 15V5z" stroke="currentColor" stroke-width="1.2" fill="none"/>
              </svg>
              <span class="history-item-text">地图指引</span>
            </div>
          </div>
          <div class="history-item" onclick="window.location.href='resources.html'">
            <div class="history-item-content">
              <svg class="history-item-icon" viewBox="0 0 16 16" fill="none">
                <path d="M4 3h10v12H4V3zm2 2v8m4-8v8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              <span class="history-item-text">研学资源</span>
            </div>
          </div>
          <div class="history-item active" onclick="window.location.href='contact.html'">
            <div class="history-item-content">
              <svg class="history-item-icon" viewBox="0 0 16 16" fill="none">
                <path d="M3 5l6 4 6-4M3 5h12v8H3V5z" stroke="currentColor" stroke-width="1.2" fill="none"/>
              </svg>
              <span class="history-item-text">联系我们</span>
            </div>
          </div>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="contact-page">
        <div class="page-header">
          <h1 class="page-title">联系我们</h1>
          <p class="page-subtitle">有任何问题或建议，欢迎随时联系我们</p>
        </div>

        <div class="contact-grid">
          <div class="contact-info-section">
            <h2 class="contact-info-title">联系方式</h2>
            
            <div class="contact-item">
              <div class="contact-icon-wrapper">
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </div>
              <div class="contact-item-content">
                <h3>邮箱</h3>
                <p><a href="mailto:ouc_tourism@example.com">ouc_tourism@example.com</a></p>
              </div>
            </div>

            <div class="contact-item">
              <div class="contact-icon-wrapper">
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
              </div>
              <div class="contact-item-content">
                <h3>微信</h3>
                <p>ouc_tourism_official</p>
              </div>
            </div>

            <div class="contact-item">
              <div class="contact-icon-wrapper">
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path>
                </svg>
              </div>
              <div class="contact-item-content">
                <h3>微博</h3>
                <p><a href="#">@海大文旅研学</a></p>
              </div>
            </div>

            <div class="contact-item">
              <div class="contact-icon-wrapper">
                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </div>
              <div class="contact-item-content">
                <h3>地址</h3>
                <p>山东省青岛市市南区鱼山路5号<br>中国海洋大学鱼山校区</p>
              </div>
            </div>

                </svg>
              </a>
              <a href="#" class="social-link" title="微博">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zm-1.005-7.405c-2.797.329-4.786 2.064-4.434 3.87.352 1.806 2.901 3.008 5.698 2.679 2.797-.329 4.786-2.064 4.434-3.87-.352-1.806-2.901-3.008-5.698-2.679zm.445-1.558c-.244-.062-.414-.027-.478.104-.064.131-.014.286.149.436.163.15.374.244.562.21.188-.034.306-.164.264-.366-.042-.202-.253-.322-.497-.384zm1.408-.628c-.684-.174-1.156-.077-1.262.217-.106.294.194.674.878.848.684.174 1.156.077 1.262-.217.106-.294-.194-.674-.878-.848zm2.078-.394c-.924-.236-1.562-.105-1.705.292-.143.397.262.91 1.186 1.146.924.236 1.562.105 1.705-.292.143-.397-.262-.91-1.186-1.146z"/>

            </div>
          </div>

          <div class="contact-form-section">
            <h2 class="form-title">给我们留言</h2>
            <form id="contact-form">
              <div class="form-group">
                <label class="form-label" for="name">姓名</label>
                <input type="text" id="name" class="form-input" placeholder="请输入您的姓名" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="email">邮箱</label>
                <input type="email" id="email" class="form-input" placeholder="请输入您的邮箱" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="subject">主题</label>
                <input type="text" id="subject" class="form-input" placeholder="请输入留言主题" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="message">留言内容</label>
                <textarea id="message" class="form-textarea" placeholder="请输入您的留言内容..." required></textarea>
              </div>
              
              <button type="submit" class="form-submit">提交留言</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;
      
      alert('感谢您的留言！我们会尽快回复您。\n\n姓名：' + name + '\n邮箱：' + email + '\n主题：' + subject);
      
      this.reset();
    });
  </script>
</body>
</html>
