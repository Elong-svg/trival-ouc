    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const guideItems = document.querySelectorAll('.ai-quick-item');
        const clearChatBtn = document.getElementById('clear-chat');
        const ageGroupSelect = document.getElementById('age-group');

        const API_CONFIG = {
            baseUrl: 'http://localhost:5000',
            model: 'qwen3-max-2026-01-23'
        };

        const OUC_KNOWLEDGE_BASE = `
# 中国海洋大学核心知识库

## 学校概况
- 中文名：中国海洋大学（Ocean University of China）
- 简称：海大（OUC）
- 创办时间：1924年
- 办学性质：公立大学，教育部直属全国重点大学
- 学校层次：国家"双一流"A类、"985工程"、"211工程"重点建设高校
- 校训：海纳百川，取则行远
- 校歌：《拥抱海洋》

## 校区分布
### 1. 鱼山校区（老校区）
- 地址：青岛市市南区鱼山路5号
- 特色：历史悠久的老校区，德式建筑群，毗邻小鱼山公园和第一海水浴场
- 主要景点：
  * 六二楼：标志性建筑，建于1931年
  * 胜利楼：历史建筑，见证学校发展
  * 海洋馆：展示海洋生物标本
  * 校园内的樱花大道（春季赏花胜地）
  * 德式建筑群：红瓦绿树，欧式风格

### 2. 崂山校区（主校区）
- 地址：青岛市崂山区松岭路238号
- 特色：现代化校区，占地广阔，设施完善
- 主要景点：
  * 图书馆：现代化图书馆，藏书丰富
  * 海洋科技大楼
  * 学生活动中心
  * 中心广场
  * 樱花大道（春季）
  * 人工湖

### 3. 西海岸校区
- 地址：青岛市西海岸新区
- 特色：新建校区，聚焦海洋科学与工程

## 学科特色
- 优势学科：海洋科学、水产、大气科学、港口海岸及近海工程
- 海洋科学：全国排名第一
- 水产学科：全国领先
- 特色专业：海洋技术、海洋资源开发、海洋生物学、船舶与海洋工程

## 校园文化
- 特色活动：
  * 海洋文化节
  * 毕业季樱花观赏
  * 学术讲座（海洋论坛）
  * 帆船体验活动
- 社团组织：海洋保护协会、潜水协会、帆船协会等

## 研学资源
- 海洋博物馆：展示海洋生物多样性
- 海洋国家重点实验室
- 标本馆：海洋生物标本收藏
- 校史馆：学校发展历程展示
- 海洋观测站

## 周边景点
- 小鱼山公园：俯瞰青岛湾美景
- 第一海水浴场：青岛最著名的海滩
- 鲁迅公园：海滨公园
- 青岛海底世界
- 八大关风景区：万国建筑博览
- 栈桥：青岛标志性建筑
- 五四广场：现代青岛地标

## 实用信息
- 官方网站：www.ouc.edu.cn
- 招生热线：0532-66782426
- 地址：山东省青岛市
- 气候：温带季风气候，四季分明
- 最佳参观季节：春季（4-5月樱花季）和秋季（9-10月）
`;

        const AGE_PROMPT_CONFIG = {
            primary_low: {
                style: '使用非常简单易懂的语言，多用比喻和生动的描述。回答要简短有趣，避免复杂概念。可以使用emoji增加趣味性。重点介绍有趣的海洋生物、校园美景和互动体验。用讲故事的方式介绍海大。',
                tone: '亲切、活泼、鼓励性、童趣',
                length: '控制在150字以内'
            },
            primary_high: {
                style: '使用简单但有一定知识性的语言。可以介绍一些基础的海洋科学知识和海大历史。回答要有趣且富有教育意义，激发好奇心。适合小学高年级学生研学使用。',
                tone: '友好、启发性、知识性、趣味',
                length: '控制在250字以内'
            },
            middle_school: {
                style: '使用青少年熟悉的语言，结合初中学习知识点。可以涉及海洋科学原理、历史背景和地理知识。回答要有教育意义，激发探索兴趣。适合初中生研学使用，可以引导思考。',
                tone: '友好、启发性、知识性、引导性',
                length: '控制在400字以内'
            },
            high_school: {
                style: '使用较为专业的语言，可以深入介绍海大的学科优势、科研实力和校园文化。结合高中知识点，提供深度解读。适合高中生研学和升学参考。可以涉及专业选择和职业规划建议。',
                tone: '专业、详实、启发性、前瞻性',
                length: '控制在500字以内'
            }
        };

        function getSystemPrompt() {
            const currentAge = ageGroupSelect.value;
            const ageConfig = AGE_PROMPT_CONFIG[currentAge];
            
            return `你是"小探"，中国海洋大学(YExplorer)的专属AI导游助手，也是用户的海大朋友。

${OUC_KNOWLEDGE_BASE}

## 你的角色定位
- 你是中国海洋大学的专业导游和研学助手
- 你深入了解海大的历史、文化、景点和研学资源
- 你能为不同年龄段的用户提供合适的讲解服务

## 当前服务对象
年龄段：${currentAge}
回答风格要求：
- 语言风格：${ageConfig.style}
- 语气：${ageConfig.tone}
- 长度：${ageConfig.length}

## 回答原则
1. 始终基于上述知识库内容回答问题
2. 如果知识库中没有的信息，请说明"这个信息我暂时不了解，建议您查阅海大官网或咨询学校相关部门"
3. 优先推荐海大特色景点和研学资源
4. 提供实用的参观建议和路线规划
5. 保持友好、专业的服务态度
6. 根据用户年龄段调整回答的深度和风格`;
        }

        let conversationHistory = [];

        function initConversation() {
            conversationHistory = [
                {
                    role: 'system',
                    content: getSystemPrompt()
                }
            ];
        }

        initConversation();

        ageGroupSelect.addEventListener('change', () => {
            conversationHistory[0].content = getSystemPrompt();
        });

        function addUserMsg(text) {
            const msg = document.createElement('div');
            msg.className = 'chat-message user';
            msg.innerHTML = `
                <div class="message-content">
                    <div class="message-sender">你</div>
                    <div class="message-text">${text}</div>
                </div>
                <div class="message-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            `;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function typeWriterEffect(element, text, speed = 30) {
            const textContainer = element.querySelector('.message-text') || element;
            const senderName = element.querySelector('.message-sender');
            let index = 0;
            
            if (!element.querySelector('.message-text')) {
                element.innerHTML = `
                    <div class="message-avatar">
                        <img src="images/AI助手形象.png" alt="AI助手">
                    </div>
                    <div class="message-content">
                        <div class="message-sender">小探</div>
                        <div class="message-text"></div>
                    </div>
                `;
            }
            
            const targetElement = element.querySelector('.message-text');
            
            return new Promise((resolve) => {
                const typingInterval = setInterval(() => {
                    if (index < text.length) {
                        const currentText = text.substring(0, index + 1);
                        targetElement.innerHTML = marked.parse(currentText);
                        index++;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    } else {
                        targetElement.innerHTML = marked.parse(text);
                        clearInterval(typingInterval);
                        resolve();
                    }
                }, speed);
            });
        }

        async function sendMsg() {
            const userText = userInput.value.trim();
            if (!userText) return;

            addUserMsg(userText);
            userInput.value = '';
            sendBtn.disabled = true;
            sendBtn.innerHTML = `<svg class="btn-icon-loading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> <span class="btn-text">思考中...</span>`;

            conversationHistory.push({
                role: 'user',
                content: userText
            });

            try {
                console.log('正在调用API...');
                console.log('API URL:', `${API_CONFIG.baseUrl}/api/chat`);
                
                const res = await fetch(`${API_CONFIG.baseUrl}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: conversationHistory
                    })
                });

                console.log('API响应状态:', res.status);

                if (!res.ok) {
                    const errorText = await res.text();
                    console.error('API错误详情:', errorText);
                    
                    let errorMessage = `API请求失败 (${res.status})`;
                    try {
                        const errorData = JSON.parse(errorText);
                        errorMessage = errorData.message || errorData.error?.message || errorMessage;
                    } catch (e) {
                        errorMessage = errorText || errorMessage;
                    }
                    
                    if (res.status === 401) {
                        errorMessage = 'API Key无效或已过期，请检查配置';
                    } else if (res.status === 429) {
                        errorMessage = '请求过于频繁，请稍后再试';
                    } else if (res.status === 0) {
                        errorMessage = '网络错误或CORS限制，请检查网络连接';
                    }
                    
                    throw new Error(errorMessage);
                }

                const result = await res.json();
                console.log('API调用成功，响应:', result);
                
                let aiReply;
                if (result.reply) {
                    aiReply = result.reply;
                } else if (result.error) {
                    throw new Error(result.error);
                } else {
                    console.error('API响应格式异常:', result);
                    throw new Error('API响应格式异常，未找到回复内容');
                }
                
                conversationHistory.push({
                    role: 'assistant',
                    content: aiReply
                });

                const aiMsg = document.createElement('div');
                aiMsg.className = 'chat-message ai';
                chatWindow.appendChild(aiMsg);
                
                await typeWriterEffect(aiMsg, aiReply);
            } catch (err) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'chat-message ai';
                chatWindow.appendChild(errorMsg);
                await typeWriterEffect(errorMsg, `请求失败：${err.message}`);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<svg class="btn-icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg> <span class="btn-text">发送</span>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        sendBtn.addEventListener('click', sendMsg);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
        
        guideItems.forEach(item => {
            item.addEventListener('click', () => {
                userInput.value = item.dataset.question;
                sendMsg();
            });
        });

        if (clearChatBtn) {
            clearChatBtn.addEventListener('click', () => {
                const messages = chatWindow.querySelectorAll('.chat-message');
                if (messages.length > 1) {
                    for (let i = 1; i < messages.length; i++) {
                        chatWindow.removeChild(messages[i]);
                    }
                }
                initConversation();
            });
        }
    </script>
