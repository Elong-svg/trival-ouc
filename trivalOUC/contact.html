<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 海大文旅</title>
    <link rel="stylesheet" href="css/style.css?v=5.0">
    <link rel="stylesheet" href="css/contact.css?v=5.0">
</head>
<body>
    <header>
        <nav class="main-nav">
            <div class="logo">
                <img src="images/logo-new.png" alt="中国海洋大学" class="logo-svg">
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="map.html">地图指引</a></li>
                <li><a href="AI.html">AI助手</a></li>
                <li><a href="resources.html">相关资源</a></li>
                <li><a href="contact.html" class="active">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-page">
        <section class="contact-hero">
            <div class="contact-hero-content">
                <h1 class="page-title">联系我们</h1>
                <p class="page-subtitle">有任何问题或建议？欢迎与我们取得联系</p>
            </div>
        </section>

        <section class="contact-section">
            <div class="contact-grid">
                <div class="contact-info-card glass-card">
                    <div class="card-header">
                        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                        </svg>
                        <h2>联系方式</h2>
                    </div>
                    <div class="info-items">
                        <div class="info-item">
                            <div class="info-icon-wrapper">
                                <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <div class="info-content">
                                <h3>电子邮件</h3>
                                <p>contact@17655998802.com</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon-wrapper">
                                <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                                </svg>
                            </div>
                            <div class="info-content">
                                <h3>官方微信</h3>
                                <p>欢迎关注我们的官方微信公众号</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon-wrapper">
                                <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13l1.1-3.55a7 7 0 0 0 3.9-3.9L23 3z"></path>
                                </svg>
                            </div>
                            <div class="info-content">
                                <h3>微博</h3>
                                <p>@海大文旅官方微博</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contact-form-card glass-card">
                    <div class="card-header">
                        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        <h2>给我们留言</h2>
                    </div>
                    <form id="contactForm" class="modern-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">
                                    <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    您的姓名
                                </label>
                                <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="email">
                                    <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                        <polyline points="22,6 12,13 2,6"></polyline>
                                    </svg>
                                    电子邮箱
                                </label>
                                <input type="email" id="email" name="email" placeholder="请输入您的邮箱地址" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="subject">
                                <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="4" y1="9" x2="20" y2="9"></line>
                                    <line x1="4" y1="15" x2="20" y2="15"></line>
                                    <line x1="10" y1="3" x2="8" y2="21"></line>
                                    <line x1="16" y1="3" x2="14" y2="21"></line>
                                </svg>
                                主题
                            </label>
                            <select id="subject" name="subject">
                                <option value="feedback">意见反馈</option>
                                <option value="cooperation">商务合作</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="message">
                                <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                留言内容
                            </label>
                            <textarea id="message" name="message" rows="5" placeholder="请输入您的留言内容..." required></textarea>
                        </div>
                        
                        <button type="submit" class="submit-btn">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                            <span>发送留言</span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>关于我们</h4>
                <p>YExplorer研探海大研学网站，致力于分享更多精彩内容</p>
            </div>
            <div class="footer-section">
                <h4>快速链接</h4>
                <ul>
                    <li><a href="map.html">地图指引</a></li>
                    <li><a href="AI.html">AI助手</a></li>
                    <li><a href="resources.html">相关资源</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 新核创研社 版权所有</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
